<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Backrooms Horror Ultra</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
body{margin:0;overflow:hidden;background:#000;touch-action:none;filter:sepia(0.25) hue-rotate(12deg) brightness(0.95) contrast(1.2)}
#info{position:absolute;top:10px;width:100%;text-align:center;color:#ffffaa;font-family:Arial;font-size:18px;font-weight:bold;text-shadow:0 0 8px #000}
#warning{display:none;position:absolute;top:35%;width:100%;text-align:center;color:#ff0000;font-size:40px;font-family:Arial;font-weight:bold;text-shadow:0 0 20px #ff0000;animation:blink 0.12s infinite}
@keyframes blink{50%{opacity:0}}
.btn{position:absolute;bottom:30px;width:75px;height:75px;font-size:32px;background:rgba(255,255,150,0.1);border:3px solid #ffff88;border-radius:20px;color:#ffffdd;touch-action:none;user-select:none;box-shadow:0 0 15px rgba(255,255,0,0.2)}
.btn:active{background:rgba(255,255,0,0.4);border-color:#ffff00}
#up{bottom:120px;left:5%}
#down{bottom:30px;left:5%}
#left{bottom:30px;left:calc(5% + 85px)}
#right{bottom:30px;left:calc(5% - 85px)}
#restart{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);padding:30px 60px;font-size:30px;background:#8b0000;color:#fff;border:4px solid #fff;border-radius:20px;z-index:10;cursor:pointer;font-weight:bold}

/* شخصية واقعية FPS */
#player-arms {
  position: fixed;
  bottom: -20px;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  height: 60%;
  background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600"><path d="M120 500 Q100 400 110 300 Q115 280 125 290 L140 320 Q150 300 160 280 Q170 270 180 290 Q200 310 210 500" fill="%23d4b483" stroke="%23987a3a" stroke-width="2"/><path d="M280 500 Q300 400 290 300 Q285 280 275 290 L260 320 Q250 300 240 280 Q230 270 220 290 Q200 310 190 500" fill="%23d4b483" stroke="%23987a3a" stroke-width="2"/><rect x="130" y="280" width="40" height="80" fill="%23222"/><rect x="230" y="280" width="40" height="80" fill="%23222"/></svg>') no-repeat center bottom;
  background-size: contain;
  z-index: 999;
  pointer-events: none;
  opacity: 0.9;
}
.running #player-arms { animation: bob 0.18s infinite; }
@keyframes bob {
 0% { transform: translateX(-50%) translateY(0); }
 50% { transform: translateX(-50%) translateY(-6px); }
}

/* وميض jump scare */
.flash { position:fixed; top:0; left:0; width:100%; height:100%; background:#000; opacity:0; pointer-events:none; z-index:1000 }
.flash.active { animation:flash 0.1s }

@keyframes flash { 0%{opacity:0} 50%{opacity:0.8} 100%{opacity:0} }

@media screen and (orientation: landscape) {
.btn { transform: scale(1.3); }
}
</style>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}</script>
</head>
<body>
<div id="info">Level 0 - لا تصدر صوتا</div>
<div id="warning">⚠️ إنه خلفك!! ⚠️</div>
<div id="player-arms"></div>
<div class="flash" id="flash"></div>

<button class="btn" id="up">▲</button>
<button class="btn" id="left">◀</button>
<button class="btn" id="down">▼</button>
<button class="btn" id="right">▶</button>
<button id="restart">🔄 إعادة المحاولة</button>

<script type="module">
import * as THREE from 'three';
let scene,camera,renderer,monster,gameOver=false;
let yaw=0,pitch=0;
const walls=[];
const ceilingLights = [];
let beepInterval = null;

function playBeep(speed){
  if(beepInterval) clearInterval(beepInterval);
  beepInterval = setInterval(()=>{
    try{
      const ctx = new AudioContext();
      const osc = ctx.createOscillator();
      osc.frequency.value = 50;
      osc.connect(ctx.destination);
      osc.start(); osc.stop(ctx.currentTime + 0.25);
    }catch(e){}
  }, speed);
}
function stopBeep(){ if(beepInterval) clearInterval(beepInterval); beepInterval = null; }

function makeWallTexture1024(isScary){
  const canvas=document.createElement('canvas'); const ctx=canvas.getContext('2d');
  canvas.width=1024; canvas.height=1024; // دقة أعلى

  ctx.fillStyle='#d4c45a'; ctx.fillRect(0,0,1024,1024);

  // نقشة + خدوش + بقع رطوبة
  ctx.strokeStyle='#b8a84a'; ctx.lineWidth=2;
  for(let i=0;i<1024;i+=32){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,1024);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(1024,i);ctx.stroke();}

  // بقع رطوبة
  ctx.fillStyle='rgba(100,80,20,0.3)';
  for(let i=0;i<20;i++){ctx.beginPath();ctx.arc(Math.random()*1024,Math.random()*1024,Math.random()*60+20,0,6.28);ctx.fill();}

  // خدوش
  ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=1;
  for(let i=0;i<30;i++){ctx.beginPath();ctx.moveTo(Math.random()*1024,Math.random()*1024);ctx.lineTo(Math.random()*1024,Math.random()*1024);ctx.stroke();}

  if(isScary){
    ctx.fillStyle='#4a0000'; ctx.font='bold 40px Arial';
    ctx.fillText('RUN', 100, 100); ctx.fillText('HELP', 800, 800);
    ctx.fillStyle='rgba(139,0,0,0.7)';
    for(let i=0;i<8;i++) ctx.beginPath(),ctx.arc(Math.random()*1024,Math.random()*1024,Math.random()*30,0,6.28),ctx.fill();
  } else {
    ctx.fillStyle='#8b0000'; ctx.font='bold 70px Arial'; ctx.textAlign='center';
    ctx.fillText('Sohail alaoui 🍁',512,512);
  }
  const tex = new THREE.CanvasTexture(canvas);
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy(); // جرافيك اقوى
  return tex;
}

function makeCarpetTexture1024(){
  const canvas=document.createElement('canvas'); const ctx=canvas.getContext('2d');
  canvas.width=1024; canvas.height=1024;
  ctx.fillStyle='#c4b45a'; ctx.fillRect(0,0,1024,1024);
  for(let i=0;i<1024;i+=8){ ctx.fillStyle = i%16===0? '#b8a84a' : '#d4c45a'; ctx.fillRect(0,i,1024,8); }
  const tex = new THREE.CanvasTexture(canvas);
  tex.anisotropy = 16;
  return tex;
}

function initGame(){
  document.body.querySelectorAll('canvas').forEach(c=>c.remove());
  stopBeep(); gameOver=false;
  document.getElementById('restart').style.display='none';
  document.getElementById('warning').style.display='none';

  scene=new THREE.Scene();
  scene.background=new THREE.Color(0xd4c45a);
  scene.fog=new THREE.FogExp2(0xd4c45a, 0.04); // ضباب اكثف

  camera=new THREE.PerspectiveCamera(80,innerWidth/innerHeight,0.1,1000);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.shadowMap.enabled = true; // ظلال حقيقية
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  document.body.appendChild(renderer.domElement);

  // إضاءة مخيفة
  scene.add(new THREE.AmbientLight(0xffffcc,0.2)); // اخفت
  for(let x=-50;x<=50;x+=12){
    for(let z=-50;z<=50;z+=12){
      const isDead = Math.random() < 0.25; // 25% مصابيح معطلة
      const light = new THREE.PointLight(0xffffdd, isDead? 0.1 : 3.5, 25);
      light.position.set(x,3.4,z);
      light.castShadow = true;
      scene.add(light);
      ceilingLights.push({light, isDead, flickerTimer: Math.random()*1000});

      const lamp = new THREE.Mesh(
        new THREE.BoxGeometry(2,0.1,2),
        new THREE.MeshStandardMaterial({color:0xffffff, emissive:0xffffdd, emissiveIntensity: isDead? 0.1 : 2.5})
      );
      lamp.position.set(x,3.45,z);
      scene.add(lamp);
    }
  }

  const carpetTex = makeCarpetTexture1024();
  const floor=new THREE.Mesh(new THREE.PlaneGeometry(400,400),new THREE.MeshStandardMaterial({map:carpetTex, roughness:0.8}));
  floor.rotation.x=-Math.PI/2; floor.receiveShadow = true; scene.add(floor);

  const ceiling=new THREE.Mesh(new THREE.PlaneGeometry(400,400),new THREE.MeshStandardMaterial({color:0xe0d86a}));
  ceiling.rotation.x=Math.PI/2; ceiling.position.y=3.5; scene.add(ceiling);

  walls.length=0;
  function addWall(x,z,w,h, scary=false){
    const tex = makeWallTexture1024(scary);
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,3.5,h), new THREE.MeshStandardMaterial({map: tex}));
    m.position.set(x,1.75,z); m.castShadow = true; m.receiveShadow = true; scene.add(m);walls.push(m);
  }

  function addPillar(x,z){
    const p=new THREE.Mesh(new THREE.BoxGeometry(1.8,3.5,1.8), new THREE.MeshStandardMaterial({map: makeWallTexture1024(false)}));
    p.position.set(x,1.75,z); p.castShadow = true; p.receiveShadow = true; scene.add(p);walls.push(p);
  }

  // **متاهة موسعة**
  addWall(0,-5,2,1); addWall(-2,0,1,20); addWall(2,0,1,20);
  addPillar(-15,5); addPillar(15,5);

  // غرفة 1
  addWall(-8,5,8,1); addWall(-12,10,1,10); addWall(-8,15,8,1); addWall(-4,10,1,10, true);

  // ممر
  addWall(0,15,2,1); addWall(-2,20,1,10); addWall(2,20,1,10);

  // غرفة 2 دائرية
  for(let i=0;i<8;i++){ const angle=i*Math.PI/4; addWall(20+Math.cos(angle)*5,30+Math.sin(angle)*5,2,1,true); }

  // غرفة 3 كبيرة بأعمدة
  addWall(-20,30,15,1); addWall(-27,37,1,15); addWall(-20,45,15,1); addWall(-13,37,1,15);
  addPillar(-23,33); addPillar(-17,33); addPillar(-23,41); addPillar(-17,41);

  // ممر جانبي مسدود
  addWall(0,45,2,1); addWall(-2,50,1,8); addWall(2,50,1,8); addWall(0,58,2,1);

  // الغرفة النهائية المرعبة
  addWall(0,65,12,1,true); addWall(-6,70,1,10,true); addWall(0,75,12,1,true); addWall(6,70,1,10,true);

  // الوحش مع Spotlight
  monster=new THREE.Mesh(
    new THREE.SphereGeometry(0.9,16,16),
    new THREE.MeshStandardMaterial({color:0x110000, emissive:0xff0000, emissiveIntensity:5})
  );
  monster.position.set(0,0.9,70); monster.castShadow = true; scene.add(monster);
  const monsterLight = new THREE.PointLight(0xff0000,5,15); monster.add(monsterLight);
  const spot = new THREE.SpotLight(0xff0000,2,20,Math.PI/6); spot.position.set(0,3,0); monster.add(spot);

  camera.position.set(0,1.6,0);
  yaw=0; pitch=0;
  animate();
}

let move={u:0,d:0,l:0,r:0};
['up','down','left','right'].forEach((k,i)=>{
  const btn=document.getElementById(k);
  const key=['u','d','l','r'][i];
  const start=()=>{move[key]=1; document.body.classList.add('running');}
  const end=()=>{move[key]=0; if(!move.u &&!move.d &&!move.l &&!move.r){document.body.classList.remove('running');}}
  btn.addEventListener('touchstart',e=>{e.preventDefault();start()});
  btn.addEventListener('touchend',e=>{e.preventDefault();end()});
  btn.addEventListener('touchcancel',e=>{e.preventDefault();end()});
});

let isDragging=false, lastX=0, lastY=0;
document.addEventListener('touchstart',e=>{
  if(e.touches.length===1 &&!e.target.classList.contains('btn') && e.target.id!=='restart'){
    isDragging=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  }
});
document.addEventListener('touchmove',e=>{
  if(isDragging){
    const dx=e.touches[0].clientX-lastX; const dy=e.touches[0].clientY-lastY;
    yaw -= dx*0.008; pitch -= dy*0.008;
    pitch = Math.max(-1.2, Math.min(1.2, pitch));
    lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  }
});
document.addEventListener('touchend',()=>{isDragging=false});

document.getElementById('restart').onclick=()=>{initGame()};

function animate(){
  if(gameOver) return;
  requestAnimationFrame(animate);
  const speed=0.095; // صعوبة اعلى شوية

  // تحديث المصابيح: وميض عشوائي + مصابيح معطلة
  ceilingLights.forEach(obj=>{
    if(obj.isDead){
      obj.light.intensity = Math.random() < 0.005? 1.5 : 0.05; // وميض نادر
    } else {
      obj.light.intensity = 3.2 + Math.sin(Date.now()*0.003 + obj.flickerTimer)*0.5; // رفرفة
    }
  });

  // jump scare عشوائي
  if(Math.random() < 0.002){
    document.getElementById('flash').classList.add('active');
    setTimeout(()=>document.getElementById('flash').classList.remove('active'), 100);
  }

  const forward = new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
  const right = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
  const newPos=camera.position.clone();
  if(move.u) newPos.addScaledVector(forward, speed);
  if(move.d) newPos.addScaledVector(forward, -speed);
  if(move.l) newPos.addScaledVector(right, -speed);
  if(move.r) newPos.addScaledVector(right, speed);

  let collision=false;
  walls.forEach(w=>{if(new THREE.Box3().setFromObject(w).containsPoint(newPos))collision=true;});
  if(!collision)camera.position.copy(newPos);

  if(move.u||move.d||move.l||move.r) camera.position.y = 1.6 + Math.sin(Date.now()*0.025)*0.035;

  const dir = camera.position.clone().sub(monster.position).normalize();
  monster.position.addScaledVector(dir, 0.075);
  monster.lookAt(camera.position);

  const dist = monster.position.distanceTo(camera.position);
  const warning = document.getElementById('warning');

  if(dist < 11){
    warning.style.display='block';
    if(dist < 4.5) playBeep(120); else playBeep(350);
  } else {
    warning.style.display='none';
    stopBeep();
  }

  if(dist<1.9){
    document.getElementById('info').innerText='تم القبض عليك!!';
    document.getElementById('restart').style.display='block';
    warning.style.display='none';
    stopBeep();
    document.body.classList.remove('running');
    gameOver=true;
  }

  camera.rotation.set(pitch, yaw, 0, 'YXZ');
  renderer.render(scene,camera);
}

initGame();
</script>
</body>
</html>
