<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horror 3D - Escape</title>
<style>
  body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial'; }
  #ui { position: absolute; top: 20px; left: 20px; color: #ff0000; font-size: 20px; text-shadow: 0 0 10px #ff0000; }
  #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); }
  #gameOver { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff0000; font-size: 60px; display: none; text-shadow: 0 0 20px #ff0000; }
  #instructions { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #aaa; }
</style>
<script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="ui">Health: <span id="health">100</span> | Keys: <span id="keys">0/3</span></div>
<div id="crosshair"></div>
<div id="gameOver">YOU DIED</div>
<div id="instructions">WASD: Move | Mouse: Look | Click: Lock Mouse | ESC: Unlock</div>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

// 1. الإعدادات الأساسية
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.035); // ضباب مرعب
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias: true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// 2. الإضاءة المرعبة
const ambientLight = new THREE.AmbientLight(0x110011, 0.3);
scene.add(ambientLight);
const flashLight = new THREE.SpotLight(0xffffcc, 2, 20, Math.PI/4, 0.5);
flashLight.castShadow = true;
camera.add(flashLight);
scene.add(camera);

// 3. التحكم FPS
const controls = new PointerLockControls(camera, document.body);
document.addEventListener('click', () => controls.lock());
const velocity = new THREE.Vector3();
const direction = new THREE.Vector3();
const keys = {w: false, a: false, s: false, d: false};

// 4. بناء المتاهة المرعبة
const maze = new THREE.Group();
const wallMat = new THREE.MeshStandardMaterial({color: 0x222222, roughness: 0.9});
const floorMat = new THREE.MeshStandardMaterial({color: 0x111111, roughness: 0.8});

for(let x = -10; x <= 10; x++){
  for(let z = -10; z <= 10; z++){
    if(Math.random() > 0.6 || x === -10 || x === 10 || z === -10 || z === 10){
      const wall = new THREE.Mesh(new THREE.BoxGeometry(2, 3, 2), wallMat);
      wall.position.set(x*2, 1.5, z*2);
      wall.castShadow = true;
      wall.receiveShadow = true;
      maze.add(wall);
    }
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), floorMat);
    floor.rotation.x = -Math.PI/2;
    floor.position.set(x*2, 0, z*2);
    floor.receiveShadow = true;
    maze.add(floor);
  }
}
scene.add(maze);

// 5. المفاتيح للهروب
const keyMeshes = [];
const keyMat = new THREE.MeshStandardMaterial({color: 0xffdd00, emissive: 0xffdd00});
for(let i=0; i<3; i++){
  const key = new THREE.Mesh(new THREE.TetrahedronGeometry(0.3), keyMat);
  key.position.set(Math.random()*16-8, 1, Math.random()*16-8);
  key.castShadow = true;
  scene.add(key);
  keyMeshes.push(key);
}

// 6. الوحش اللي كيجري موراك
const monster = new THREE.Mesh(
  new THREE.CapsuleGeometry(0.5, 1.5, 4, 8),
  new THREE.MeshStandardMaterial({color: 0x550000, emissive: 0x330000})
);
monster.position.set(8, 1.25, 8);
monster.castShadow = true;
scene.add(monster);

// 7. الصوت المرعب
const audioListener = new THREE.AudioListener();
camera.add(audioListener);
const monsterSound = new THREE.Audio(audioListener);
// ملاحظة: خاصك تزيد ملف صوت horror.mp3
// const audioLoader = new THREE.AudioLoader();
// audioLoader.load('horror.mp3', (buffer) => { monsterSound.setBuffer(buffer); monsterSound.setLoop(true); monsterSound.play(); });

// 8. متغيرات اللعبة
let health = 100;
let collectedKeys = 0;
camera.position.set(0, 2, 0);

// 9. الحركة والتصادم
document.addEventListener('keydown', (e) => { if(e.code==='KeyW') keys.w=true; if(e.code==='KeyA') keys.a=true; if(e.code==='KeyS') keys.s=true; if(e.code==='KeyD') keys.d=true; });
document.addEventListener('keyup', (e) => { if(e.code==='KeyW') keys.w=false; if(e.code==='KeyA') keys.a=false; if(e.code==='KeyS') keys.s=false; if(e.code==='KeyD') keys.d=false; });

function checkCollision(pos){
  for(let child of maze.children){
    if(child.geometry.type === 'BoxGeometry'){
      if(Math.abs(pos.x - child.position.x) < 1 && Math.abs(pos.z - child.position.z) < 1){
        return true;
      }
    }
  }
  return false;
}

// 10. حلقة اللعبة
function animate(){
  requestAnimationFrame(animate);
  
  if(controls.isLocked){
    // حركة اللاعب
    velocity.x -= velocity.x * 10.0 * 0.016;
    velocity.z -= velocity.z * 10.0 * 0.016;
    direction.z = Number(keys.w) - Number(keys.s);
    direction.x = Number(keys.d) - Number(keys.a);
    direction.normalize();
    if(keys.w || keys.s) velocity.z -= direction.z * 20.0 * 0.016;
    if(keys.a || keys.d) velocity.x -= direction.x * 20.0 * 0.016;
    
    const newPos = controls.object.position.clone();
    newPos.x += velocity.x * 0.016;
    newPos.z += velocity.z * 0.016;
    if(!checkCollision(newPos)) controls.object.position.copy(newPos);
    
    // حركة الوحش AI بسيط
    monster.lookAt(camera.position);
    monster.position.add(monster.getWorldDirection(new THREE.Vector3()).multiplyScalar(0.03));
    
    // التصادم مع الوحش
    if(monster.position.distanceTo(camera.position) < 1.5){
      health -= 0.5;
      document.getElementById('health').innerText = Math.floor(health);
      if(health <= 0) document.getElementById('gameOver').style.display = 'block';
    }
    
    // جمع المفاتيح
    keyMeshes.forEach((key, i) => {
      key.rotation.y += 0.05;
      if(key.visible && key.position.distanceTo(camera.position) < 1.5){
        key.visible = false;
        collectedKeys++;
        document.getElementById('keys').innerText = `${collectedKeys}/3`;
      }
    });
    
    if(collectedKeys === 3) alert("You Escaped!"); // نقطة الهروب
  }
  
  renderer.render(scene, camera);
}
animate();

// 11. تعديل الحجم
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
