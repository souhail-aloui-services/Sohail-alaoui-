<!DOCTYPE html>
<html>
<head>
<title>MyPoints - اربح نقاط</title>
<style>
  body{background:#0a0a0a; color:#fff; font-family:Arial; text-align:center;}
  .box{background:#1a1a1a; padding:20px; margin:20px; border-radius:10px;}
  button{background:#ff0000; color:#fff; border:0; padding:10px 20px; border-radius:5px; cursor:pointer;}
  #points{font-size:30px; color:#00ff00;}
</style>
</head>
<body>
<h1>🎁 MyPoints</h1>

<div class="box">
  <h2>رصيدك: <span id="points">0</span> نقطة</h2>
  <button onclick="claimBonus()">+100 نقطة تسجيل اليوم</button>
</div>

<div class="box">
  <h2>المهام</h2>
  <p>تحميل تطبيق +500 نقطة</p>
  <button onclick="addPoints(500)">إكمال المهمة</button>
  <p>استبيان +200 نقطة</p>
  <button onclick="addPoints(200)">إكمال المهمة</button>
</div>

<div class="box">
  <h2>المتجر</h2>
  <p>اشتراك Free Fire 1000 نقطة</p>
  <button onclick="buy(1000)">اشتري</button>
  <p>رصيد PayPal $5 = 5000 نقطة</p>
  <button onclick="buy(5000)">اشتري</button>
</div>

<script>
let points = localStorage.getItem('points') || 0;
document.getElementById('points').innerText = points;

function addPoints(p){
  points = parseInt(points) + p;
  localStorage.setItem('points', points);
  document.getElementById('points').innerText = points;
  alert("مبروك +"+p+" نقطة");
}

function claimBonus(){
  addPoints(100);
}

function buy(cost){
  if(points >= cost){
    points = points - cost;
    localStorage.setItem('points', points);
    document.getElementById('points').innerText = points;
    alert("تم الشراء! غادي نتواصل معاك");
  }else{
    alert("النقاط غير كافية");
  }
}
</script>
</body>
</html>
