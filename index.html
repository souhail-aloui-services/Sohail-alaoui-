<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Backrooms - Escape</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: Arial; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #d4c45a;
            font-size: 20px; text-shadow: 2px 2px 4px #000;
        }
        #controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: grid; grid-template-columns: 60px 60px 60px; gap: 10px;
        }
       .btn {
            width: 60px; height: 60px; background: rgba(212,196,90,0.3);
            border: 2px solid #d4c45a; border-radius: 15px; color: #d4c45a;
            font-size: 24px; cursor: pointer;
        }
        #flashBtn {
            position: absolute; bottom: 30px; right: 30px;
            width: 70px; height: 70px; border-radius: 50%;
            background: rgba(255,255,0,0.4); border: 3px solid yellow;
            font-size: 30px;
        }
        #gameover {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            color: red; font-size: 40px; display: none; text-align: center;
        }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
    </script>
</head>
<body>
    <div id="ui">المفاتيح: <span id="keys">0/3</span></div>
    <div id="controls">
        <div></div><button class="btn" id="up">▲</button><div></div>
        <button class="btn" id="left">◀</button><button class="btn" id="down">▼</button><button class="btn" id="right">▶</button>
    </div>
    <button id="flashBtn">💡</button>
    <div id="gameover"></div>

<script type="module">
import * as THREE from 'three';

// 1. الإعدادات الأساسية
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000, 5, 25); // الضباب المرعب
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias: true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 2. الضو
const ambient = new THREE.AmbientLight(0xffffaa, 0.1); // ضو خافت جدا
scene.add(ambient);
const flashlight = new THREE.PointLight(0xffffcc, 2, 15);
flashlight.position.set(0,1.5,0);
scene.add(flashlight);
let flashlightOn = true;

// 3. بناء الغرفة - اللون الأصفر ديال Backrooms
const wallMat = new THREE.MeshStandardMaterial({color: 0xd4c45a});
const floorMat = new THREE.MeshStandardMaterial({color: 0xd4c45a});

// الأرض + السقف
const floor = new THREE.Mesh(new THREE.PlaneGeometry(20,20), floorMat);
floor.rotation.x = -Math.PI/2; scene.add(floor);
const ceiling = floor.clone(); ceiling.rotation.x = Math.PI/2; ceiling.position.y = 3; scene.add(ceiling);

// 4 جدران
[[0,-10],[0,10],[-10,0],[10,0]].forEach(([x,z], i)=>{
    const wall = new THREE.Mesh(new THREE.BoxGeometry(20,3,0.5), wallMat);
    wall.position.set(x,1.5,z);
    if(i>1) wall.rotation.y = Math.PI/2;
    scene.add(wall);
});

// 4. المفاتيح 3
const keys = [];
for(let i=0; i<3; i++){
    const key = new THREE.Mesh(new THREE.SphereGeometry(0.3,16,16), new THREE.MeshStandardMaterial({color: 0xffd700, emissive: 0xffd700}));
    key.position.set(Math.random()*14-7, 0.5, Math.random()*14-7);
    keys.push(key); scene.add(key);
}
let collectedKeys = 0;

// 5. باب الهروب
const door = new THREE.Mesh(new THREE.BoxGeometry(2,2.5,0.2), new THREE.MeshStandardMaterial({color: 0x8B4513}));
door.position.set(0,-9.8,1.25); scene.add(door);

// 6. الوحش
const monster = new THREE.Mesh(new THREE.BoxGeometry(1,2,1), new THREE.MeshStandardMaterial({color: 0x111111}));
monster.position.set(5,1,5); scene.add(monster);
let monsterSpeed = 0.03;

// 7. التحكم
camera.position.set(0,1.5,0);
let keys_pressed = {};
document.addEventListener('keydown', e=> keys_pressed[e.key] = true);
document.addEventListener('keyup', e=> keys_pressed[e.key] = false);

// أزرار الموبايل
['up','down','left','right'].forEach(id=>{
    document.getElementById(id).ontouchstart = ()=> keys_pressed[id] = true;
    document.getElementById(id).ontouchend = ()=> keys_pressed[id] = false;
});

document.getElementById('flashBtn').onclick = ()=>{
    flashlightOn =!flashlightOn;
    flashlight.visible = flashlightOn;
}

// 8. حلقة اللعبة
function animate(){
    requestAnimationFrame(animate);
    
    // حركة اللاعب
    const speed = 0.1;
    if(keys_pressed['w']||keys_pressed['up']) camera.position.z -= speed;
    if(keys_pressed['s']||keys_pressed['down']) camera.position.z += speed;
    if(keys_pressed['a']||keys_pressed['left']) camera.position.x -= speed;
    if(keys_pressed['d']||keys_pressed['right']) camera.position.x += speed;
    flashlight.position.copy(camera.position);

    // جمع المفاتيح
    keys.forEach((key,i)=>{
        if(key && camera.position.distanceTo(key.position) < 1){
            scene.remove(key); keys[i]=null; collectedKeys++;
            document.getElementById('keys').innerText = collectedKeys+'/3';
        }
    });

    // حركة الوحش
    const dir = camera.position.clone().sub(monster.position).normalize();
    monster.position.add(dir.multiplyScalar(monsterSpeed));
    monster.lookAt(camera.position);

    // إلا الوحش قرب
    if(monster.position.distanceTo(camera.position) < 1.5){
        document.getElementById('gameover').innerHTML = "الوحش مسكك!<br>خسرت";
        document.getElementById('gameover').style.display = 'block';
    }

    // إلا جمعتي 3 و وصلتي للباب
    if(collectedKeys >= 3 && camera.position.distanceTo(door.position) < 2){
        document.getElementById('gameover').innerHTML = "هربت! <br> ربحت";
        document.getElementById('gameover').style.color = 'green';
        document.getElementById('gameover').style.display = 'block';
    }

    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
