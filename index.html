<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Backrooms Horror Realistic</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
body{margin:0;overflow:hidden;background:#000;touch-action:none;filter:sepia(0.2) hue-rotate(10deg) brightness(1.1) contrast(1.1)} /* فلتر Backrooms */
#info{position:absolute;top:10px;width:100%;text-align:center;color:#ffffaa;font-family:Arial;font-size:18px;font-weight:bold;text-shadow:0 0 8px #000}
#warning{display:none;position:absolute;top:35%;width:100%;text-align:center;color:#ff0000;font-size:40px;font-family:Arial;font-weight:bold;text-shadow:0 0 20px #ff0000;animation:blink 0.15s infinite}
@keyframes blink{50%{opacity:0}}
.btn{position:absolute;bottom:30px;width:75px;height:75px;font-size:32px;background:rgba(255,255,150,0.15);border:3px solid #ffff88;border-radius:20px;color:#ffffdd;touch-action:none;user-select:none;box-shadow:0 0 15px rgba(255,255,0,0.3)}
.btn:active{background:rgba(255,255,0,0.4);border-color:#ffff00}
#up{bottom:120px;left:5%}
#down{bottom:30px;left:5%}
#left{bottom:30px;left:calc(5% + 85px)}
#right{bottom:30px;left:calc(5% - 85px)}
#restart{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);padding:30px 60px;font-size:30px;background:#8b0000;color:#fff;border:4px solid #fff;border-radius:20px;z-index:10;cursor:pointer;font-weight:bold}

/* شخصية واقعية FPS */
#player-arms {
  position: fixed;
  bottom: -20px;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  height: 60%;
  background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600"><path d="M120 500 Q100 400 110 300 Q115 280 125 290 L140 320 Q150 300 160 280 Q170 270 180 290 Q200 310 210 500" fill="%23d4b483" stroke="%23987a3a" stroke-width="2"/><path d="M280 500 Q300 400 290 300 Q285 280 275 290 L260 320 Q250 300 240 280 Q230 270 220 290 Q200 310 190 500" fill="%23d4b483" stroke="%23987a3a" stroke-width="2"/><rect x="130" y="280" width="40" height="80" fill="%23222"/><rect x="230" y="280" width="40" height="80" fill="%23222"/></svg>') no-repeat center bottom;
  background-size: contain;
  z-index: 999;
  pointer-events: none;
  opacity: 0.9;
}
.running #player-arms { animation: bob 0.2s infinite; }
@keyframes bob {
 0% { transform: translateX(-50%) translateY(0); }
 50% { transform: translateX(-50%) translateY(-5px); }
}

@media screen and (orientation: landscape) {
.btn { transform: scale(1.3); }
}
</style>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}</script>
</head>
<body>
<div id="info">Level 0 - لا تصدر صوتا</div>
<div id="warning">⚠️ إنه خلفك!! ⚠️</div>
<div id="player-arms"></div>

<button class="btn" id="up">▲</button>
<button class="btn" id="left">◀</button>
<button class="btn" id="down">▼</button>
<button class="btn" id="right">▶</button>
<button id="restart">🔄 إعادة المحاولة</button>

<script type="module">
import * as THREE from 'three';
let scene,camera,renderer,monster,gameOver=false;
let yaw=0,pitch=0;
const walls=[];
const ceilingLights = []; // جديد: مصابيح السقف
let beepInterval = null;

function playBeep(speed){
  if(beepInterval) clearInterval(beepInterval);
  beepInterval = setInterval(()=>{
    try{
      const ctx = new AudioContext();
      const osc = ctx.createOscillator();
      osc.frequency.value = 60; // همهمة Backrooms
      osc.connect(ctx.destination);
      osc.start(); osc.stop(ctx.currentTime + 0.2);
    }catch(e){}
  }, speed);
}
function stopBeep(){ if(beepInterval) clearInterval(beepInterval); beepInterval = null; }

function makeWallTexture(isScary){
  const canvas=document.createElement('canvas'); const ctx=canvas.getContext('2d');
  canvas.width=512; canvas.height=512;

  // **جديد: لون الجدران بحال الصورة**
  ctx.fillStyle='#d4c45a'; ctx.fillRect(0,0,512,512);

  // **جديد: نقشة ورق الحائط مربعات**
  ctx.strokeStyle='#b8a84a'; ctx.lineWidth=1;
  for(let i=0;i<512;i+=32){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,512);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(512,i);ctx.stroke();}

  if(isScary){
    ctx.fillStyle='#4a0000'; ctx.font='bold 20px Arial';
    ctx.fillText('RUN', 50, 50); ctx.fillText('HELP', 400, 400);
    ctx.fillStyle='rgba(139,0,0,0.6)';
    for(let i=0;i<5;i++) ctx.beginPath(),ctx.arc(Math.random()*512,Math.random()*512,Math.random()*15,0,6.28),ctx.fill();
  } else {
    ctx.fillStyle='#8b0000'; ctx.font='bold 40px Arial'; ctx.textAlign='center';
    ctx.fillText('Sohail alaoui 🍁',256,256);
  }
  return new THREE.CanvasTexture(canvas);
}

function makeCarpetTexture(){ // جديد
  const canvas=document.createElement('canvas'); const ctx=canvas.getContext('2d');
  canvas.width=512; canvas.height=512;
  ctx.fillStyle='#c4b45a'; ctx.fillRect(0,0,512,512);
  for(let i=0;i<512;i+=8){ ctx.fillStyle = i%16===0? '#b8a84a' : '#d4c45a'; ctx.fillRect(0,i,512,8); }
  return new THREE.CanvasTexture(canvas);
}

function initGame(){
  document.body.querySelectorAll('canvas').forEach(c=>c.remove());
  stopBeep(); gameOver=false;
  document.getElementById('restart').style.display='none';
  document.getElementById('warning').style.display='none';

  scene=new THREE.Scene();
  scene.background=new THREE.Color(0xd4c45a); // جديد: خلفية صفراء
  scene.fog=new THREE.Fog(0xd4c45a,5,25);

  camera=new THREE.PerspectiveCamera(80,innerWidth/innerHeight,0.1,1000);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.toneMapping = THREE.ACESFilmicToneMapping; // جديد: جرافيك اقوى
  renderer.toneMappingExposure = 1.2;
  document.body.appendChild(renderer.domElement);

  // **جديد: إضاءة بحال الصورة - مصابيح سقف مربعة**
  scene.add(new THREE.AmbientLight(0xffffcc,0.5));
  for(let x=-30;x<=30;x+=10){
    for(let z=-30;z<=30;z+=10){
      const light = new THREE.PointLight(0xffffdd,4,30);
      light.position.set(x,3.4,z);
      scene.add(light);
      ceilingLights.push(light);

      const lamp = new THREE.Mesh(
        new THREE.BoxGeometry(1.8,0.1,1.8),
        new THREE.MeshStandardMaterial({color:0xffffff, emissive:0xffffdd, emissiveIntensity:3})
      );
      lamp.position.set(x,3.45,z);
      scene.add(lamp);
    }
  }

  const carpetTex = makeCarpetTexture(); // جديد
  const floor=new THREE.Mesh(new THREE.PlaneGeometry(200,200),new THREE.MeshStandardMaterial({map:carpetTex, roughness:0.7}));
  floor.rotation.x=-Math.PI/2;scene.add(floor);

  const ceiling=new THREE.Mesh(new THREE.PlaneGeometry(200,200),new THREE.MeshStandardMaterial({color:0xe0d86a}));
  ceiling.rotation.x=Math.PI/2; ceiling.position.y=3.5; scene.add(ceiling);

  walls.length=0;
  function addWall(x,z,w,h, scary=false){
    const tex = makeWallTexture(scary);
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,3.5,h), new THREE.MeshStandardMaterial({map: tex}));
    m.position.set(x,1.75,z);scene.add(m);walls.push(m);
  }

  function addPillar(x,z){ // جديد: أعمدة
    const p=new THREE.Mesh(new THREE.BoxGeometry(1.5,3.5,1.5), new THREE.MeshStandardMaterial({map: makeWallTexture(false)}));
    p.position.set(x,1.75,z);scene.add(p);walls.push(p);
  }

  // **متاهة + غرف + أروقة ديقة + أعمدة**
  addWall(0,-5,2,1); addWall(-2,0,1,20); addWall(2,0,1,20);
  addPillar(-15,5); addPillar(15,5); addPillar(-15,25); addPillar(15,25);

  addWall(-8,5,8,1); addWall(-12,10,1,10); addWall(-8,15,8,1); addWall(-4,10,1,10, true);

  addWall(0,15,2,1); addWall(-2,20,1,10); addWall(2,20,1,10);

  addWall(8,25,8,1, true); addWall(12,30,1,10, true); addWall(8,35,8,1, true); addWall(4,30,1,10, true);

  addWall(0,35,2,1); addWall(-2,45,1,20); addWall(2,45,1,20);

  addWall(0,55,2,1, true);

  monster=new THREE.Mesh(
    new THREE.SphereGeometry(0.8,16,16),
    new THREE.MeshStandardMaterial({color:0x110000, emissive:0xff0000, emissiveIntensity:4})
  );
  monster.position.set(0,0.8,50);
  scene.add(monster);
  const monsterLight = new THREE.PointLight(0xff0000,4,12); monster.add(monsterLight);

  camera.position.set(0,1.6,0);
  yaw=0; pitch=0;
  animate();
}

let move={u:0,d:0,l:0,r:0};
['up','down','left','right'].forEach((k,i)=>{
  const btn=document.getElementById(k);
  const key=['u','d','l','r'][i];
  const start=()=>{move[key]=1; document.body.classList.add('running');}
  const end=()=>{move[key]=0; if(!move.u &&!move.d &&!move.l &&!move.r){document.body.classList.remove('running');}}
  btn.addEventListener('touchstart',e=>{e.preventDefault();start()});
  btn.addEventListener('touchend',e=>{e.preventDefault();end()});
  btn.addEventListener('touchcancel',e=>{e.preventDefault();end()});
});

let isDragging=false, lastX=0, lastY=0;
document.addEventListener('touchstart',e=>{
  if(e.touches.length===1 &&!e.target.classList.contains('btn') && e.target.id!=='restart'){
    isDragging=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  }
});
document.addEventListener('touchmove',e=>{
  if(isDragging){
    const dx=e.touches[0].clientX-lastX; const dy=e.touches[0].clientY-lastY;
    yaw -= dx*0.008; pitch -= dy*0.008;
    pitch = Math.max(-1.2, Math.min(1.2, pitch));
    lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  }
});
document.addEventListener('touchend',()=>{isDragging=false});

document.getElementById('restart').onclick=()=>{initGame()};

function animate(){
  if(gameOver) return;
  requestAnimationFrame(animate);
  const speed=0.1;

  // **جديد: وميض خفيف فالمصابيح**
  ceilingLights.forEach(l=>{l.intensity = 3.8 + Math.random()*0.4});

  const forward = new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
  const right = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
  const newPos=camera.position.clone();
  if(move.u) newPos.addScaledVector(forward, speed);
  if(move.d) newPos.addScaledVector(forward, -speed);
  if(move.l) newPos.addScaledVector(right, -speed);
  if(move.r) newPos.addScaledVector(right, speed);

  let collision=false;
  walls.forEach(w=>{if(new THREE.Box3().setFromObject(w).containsPoint(newPos))collision=true;});
  if(!collision)camera.position.copy(newPos);

  if(move.u||move.d||move.l||move.r) camera.position.y = 1.6 + Math.sin(Date.now()*0.02)*0.03;

  const dir = camera.position.clone().sub(monster.position).normalize();
  monster.position.addScaledVector(dir, 0.07);
  monster.lookAt(camera.position);

  const dist = monster.position.distanceTo(camera.position);
  const warning = document.getElementById('warning');

  if(dist < 10){
    warning.style.display='block';
    if(dist < 5) playBeep(150); else playBeep(400);
  } else {
    warning.style.display='none';
    stopBeep();
  }

  if(dist<2){
    document.getElementById('info').innerText='تم القبض عليك!!';
    document.getElementById('restart').style.display='block';
    warning.style.display='none';
    stopBeep();
    document.body.classList.remove('running');
    gameOver=true;
  }

  camera.rotation.set(pitch, yaw, 0, 'YXZ');
  renderer.render(scene,camera);
}

initGame();
</script>
</body>
</html>
